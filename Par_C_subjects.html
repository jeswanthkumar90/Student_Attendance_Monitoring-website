<!DOCTYPE html>
<html>
<head>

<title>Child Subjects</title>

<style>

body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #c9eef9, #f4f5f7);
            text-align: center;
        }

.container{
width:500px;
margin:auto;
margin-top:50px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.subject{
padding:12px;
margin:10px;
background:#4CAF50;
color:white;
border-radius:6px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Child Subjects</h2>

<div id="subjectsList"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const childRoll = localStorage.getItem("childRoll");

    console.log("Child Roll from localStorage:", childRoll);

    if (!childRoll) {
        alert("Child not found. Please login again.");
        window.location.href = "Par_Login.html";
        return;
    }

    fetch(`http://localhost:3000/child-subjects/${childRoll}`)
    .then(res => res.json())
    .then(data => {

        console.log("Subjects received:", data);

        const container = document.getElementById("subjectsList");

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = "<p>No subjects found</p>";
            return;
        }

        container.innerHTML = "";

        data.forEach(sub => {
            container.innerHTML += `
                <div class="subject">
                    ${sub.subject}
                </div>
            `;
        });

    })
    .catch(err => {
        console.error("Fetch error:", err);
        alert("Failed to load subjects");
    });

});

</script>

</body>
</html>
