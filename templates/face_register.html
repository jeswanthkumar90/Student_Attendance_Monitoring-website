<!DOCTYPE html>
<html>
<head>
<title>Register Face + Fingerprint</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background:
        linear-gradient(rgba(255,255,255,0.432), rgba(255,255,255,0.409)),
        url("https://images.unsplash.com/photo-1529070538774-1843cb3265df")
        no-repeat center center fixed;
    background-size: cover;
}
video {
    border: 3px solid #2196F3;
    border-radius: 10px;
}
input {
    padding: 10px;
    font-size: 15px;
    width: 220px;
}
button {
    padding: 12px 25px;
    font-size: 16px;
    margin-top: 10px;
    cursor: pointer;
}
#fpStatus {
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Register Face + Fingerprint</h2>

<input type="text" id="roll" placeholder="Roll Number"><br><br>
<input type="text" id="name" placeholder="Name"><br><br>

<video id="video" width="400" height="300" autoplay playsinline></video><br><br>

<button onclick="captureFingerprint()">Scan Fingerprint</button>
<p id="fpStatus"> Fingerprint not captured</p>

<button onclick="registerFace()">Capture & Register</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let fingerprintData = "";
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(err => {
    alert("Camera error");
    console.error(err);
});

async function captureFingerprint() {
    const statusEl = document.getElementById("fpStatus");
    statusEl.innerText = "⏳ Initializing... Place finger when light glows";

    try {
        const response = await fetch("/capture-fingerprint"); 
        const data = await response.text();

        if (data.includes('errCode="0"')) {
            fingerprintData = data; 
            statusEl.innerText = " Fingerprint captured";
            statusEl.style.color = "green";
        } else {
            statusEl.innerText = " Capture failed. Try again.";
            statusEl.style.color = "red";
        }
    } catch (err) {
        statusEl.innerText = " RD Service Bridge Error";
    }
}


function registerFace() {

    const roll = document.getElementById("roll").value.trim();
    const name = document.getElementById("name").value.trim();

    if (!roll || !name) {
        alert("Enter roll number and name");
        return;
    }

    if (!fingerprintData) {
        alert("Please scan fingerprint first");
        return;
    }

    if (video.videoWidth === 0) {
        alert("Camera not ready");
        return;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    canvas.toBlob(function(blob) {

        const formData = new FormData();
        formData.append("roll", roll);
        formData.append("name", name);
        formData.append("image", blob);
        formData.append("fingerprint", fingerprintData);

        fetch("/register-face", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            alert(data.message);

            if (data.status === "success") {
                fingerprintData = "";
                document.getElementById("fpStatus").innerText = " Fingerprint not captured";
            }

        })
        .catch(err => {
            console.error(err);
            alert("Server error");
        });

    }, "image/jpeg", 0.95);
}

</script>

</body>
</html>
