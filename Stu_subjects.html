    </select>

    <button onclick="registerSubjects()">Register Subjects</button>
</div>

<div id="displaySection" style="display:none">
    <h3>Your Registered Subjects</h3>
    <ul id="subjectList"></ul>
</div>

</div>
</div>

<script>
const studentEmail = localStorage.getItem("studentEmail");

if (!studentEmail) {
    alert("Session expired");
    window.location.href = "student-login.html";
}

const formSection = document.getElementById("formSection");
const displaySection = document.getElementById("displaySection");
const subjectList = document.getElementById("subjectList");

fetch(`http://localhost:3000/student-subjects/${encodeURIComponent(studentEmail)}`)
.then(res => res.json())
.then(subjects => {
    if (subjects.length > 0) {
        showSubjects(subjects);
    }
});

function registerSubjects() {
    const selects = document.querySelectorAll(".subject");
    const subjects = Array.from(selects).map(s => s.value);

    if (subjects.includes("")) {
        alert("Please select all 8 subjects");
        return;
    }

    const unique = new Set(subjects);
    if (unique.size !== subjects.length) {
        alert("Duplicate subjects are not allowed");
        return;
    }

    fetch("http://localhost:3000/student-subjects", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: studentEmail, subjects })
    })
    .then(res => {
        if (!res.ok) throw new Error("Already registered");
        return res.json();
    })
    .then(() => {
        showSubjects(subjects);
    })
    .catch(err => {
        alert("Subjects already registered");
    });
}

function showSubjects(subjects) {
    formSection.style.display = "none";
    displaySection.style.display = "block";

    subjectList.innerHTML = "";
    subjects.forEach(sub => {
        const li = document.createElement("li");
        li.textContent = sub;
        subjectList.appendChild(li);
    });
}
</script>
